<div class="login-container">
  <div class="login-card">
    
    <div class="logo-wrapper">
      <img src="assets/logo-goticket.png" alt="Go Ticket Logo">
    </div>

    <p class="subtitle">Efetue seu login</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <label>E-mail</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="email" placeholder="email@email.com" type="email">
      </mat-form-field>

      <label>Senha</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="password" placeholder="senha123#@" type="password">
      </mat-form-field>

      <button mat-flat-button class="btn-entrar" type="submit" [disabled]="!loginForm.valid">
        Entrar
      </button>

      <div class="login-footer">
        <a href="#">Criar conta</a>
        <a href="#">Recuperar senha</a>
      </div>
      
    </form>
  </div>
</div>
